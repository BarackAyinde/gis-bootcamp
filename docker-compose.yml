services:
  spatial-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: gis-bootcamp:latest
    container_name: gis-spatial-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      # Mount a local data directory read-only for input files
      - ./data:/app/data:ro
      # Writable output directory for generated files
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
